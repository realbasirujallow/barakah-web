name: IndexNow - notify Bing Yandex Seznam

# Fires after every push to main that touches the public sitemap or a page
# file. IndexNow is the standards-track bulk-submission protocol accepted
# by Bing, Yandex, Seznam, Naver, and Mojeek. Google does NOT accept
# IndexNow today - see docs/SEO-INDEXING-PLAYBOOK.md for Google's
# sitemap-submission flow (requires manual action in Search Console).
#
# The IndexNow endpoint verifies ownership by fetching
#   https://trybarakah.com/<KEY>.txt
# expecting the file body to equal the key. Both the key and the key file
# are committed in this repo (public/<key>.txt). Do NOT delete the key
# file; it is permanently tied to the domain.

on:
  push:
    branches: [ main ]
    paths:
      - 'src/app/**/page.tsx'
      - 'src/app/**/layout.tsx'
      - 'src/app/sitemap.*'
      - 'public/robots.txt'
      - 'public/sitemap.xml'
      - '.github/workflows/indexnow.yml'
  workflow_dispatch:
    inputs:
      full_resubmit:
        description: 'Submit EVERY URL in sitemap (default: only key pages)'
        required: false
        default: 'false'

jobs:
  submit:
    name: Push URLs to IndexNow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Wait for deploy to propagate
        # Deploys take 60s-2m after push; submitting too early makes
        # IndexNow crawlers fetch a stale page. 90s buffer is conservative.
        run: sleep 90

      - name: Extract sitemap URLs
        id: urls
        run: |
          set -euo pipefail
          curl -fsSL https://trybarakah.com/sitemap.xml -o /tmp/sitemap.xml
          grep -oE '<loc>[^<]+</loc>' /tmp/sitemap.xml \
            | sed 's|<loc>||; s|</loc>||' \
            | sort -u > /tmp/all-urls.txt
          wc -l /tmp/all-urls.txt
          echo "total=$(wc -l < /tmp/all-urls.txt)" >> "$GITHUB_OUTPUT"

      - name: Build IndexNow payload
        id: payload
        env:
          FULL_RESUBMIT: ${{ github.event.inputs.full_resubmit || 'false' }}
          KEY: '140db6db4ee38df9d39565683ff0b1734617c449d136e11d8e6fb0d7502663ab'
        run: |
          set -euo pipefail
          # Default: submit only pages touched by the push (inferred from
          # git diff). With workflow_dispatch + full_resubmit=true, submit all.
          if [ "${FULL_RESUBMIT}" = "true" ]; then
            cp /tmp/all-urls.txt /tmp/submit-urls.txt
          else
            # Touched files -> candidate URLs. Only submit URLs that are
            # actually in the live sitemap (so we never submit draft /
            # private routes by accident).
            git diff --name-only HEAD~1 HEAD \
              | awk -F'/' '/^src\/app\//' \
              | sed -E 's|^src/app||; s|/page\.tsx$||; s|/layout\.tsx$||' \
              | sed 's|^$|/|' \
              | awk -v d=https://trybarakah.com '{print d $0}' \
              | sort -u > /tmp/touched-urls.txt
            # Intersect with live sitemap
            comm -12 /tmp/touched-urls.txt /tmp/all-urls.txt > /tmp/submit-urls.txt || true
            # If nothing touched matches the sitemap (pure infra change),
            # fall back to submitting just the homepage.
            if [ ! -s /tmp/submit-urls.txt ]; then
              echo "https://trybarakah.com" > /tmp/submit-urls.txt
            fi
          fi
          echo "Submitting:"
          cat /tmp/submit-urls.txt
          # Build JSON payload with jq (avoids brittle python heredoc).
          jq -Rcs --arg key "$KEY" --arg host 'trybarakah.com' --arg keyLoc "https://trybarakah.com/${KEY}.txt" '
            split("\n")
            | map(select(length > 0))
            | { host: $host, key: $key, keyLocation: $keyLoc, urlList: . }
          ' /tmp/submit-urls.txt > /tmp/payload.json
          # Head of payload for debugging (key is public so no redaction needed).
          head -c 500 /tmp/payload.json
          echo
          echo "count=$(jq '.urlList | length' /tmp/payload.json)" >> "$GITHUB_OUTPUT"

      - name: Submit to IndexNow (Bing)
        run: |
          set -e
          curl -sS -X POST 'https://api.indexnow.org/IndexNow' \
            -H 'Content-Type: application/json; charset=utf-8' \
            --data @/tmp/payload.json \
            -w '\nHTTP %{http_code}\n' | tee /tmp/resp.txt
          grep -qE 'HTTP (200|202)' /tmp/resp.txt

      - name: Submit to Yandex
        continue-on-error: true
        run: |
          curl -sS -X POST 'https://yandex.com/indexnow' \
            -H 'Content-Type: application/json; charset=utf-8' \
            --data @/tmp/payload.json \
            -w '\nHTTP %{http_code}\n' | tee -a /tmp/resp.txt

      - name: Submit to Seznam
        continue-on-error: true
        run: |
          curl -sS -X POST 'https://search.seznam.cz/indexnow' \
            -H 'Content-Type: application/json; charset=utf-8' \
            --data @/tmp/payload.json \
            -w '\nHTTP %{http_code}\n' | tee -a /tmp/resp.txt

      - name: Summary
        if: always()
        run: |
          {
            echo "## IndexNow submission"
            echo "- URL count submitted: ${{ steps.payload.outputs.count }}"
            echo "- Sitemap total: ${{ steps.urls.outputs.total }}"
            echo ""
            echo "### Responses"
            echo '```'
            cat /tmp/resp.txt 2>/dev/null || echo '(no responses)'
            echo '```'
            echo ""
            echo "**Note:** Google does not honor IndexNow. For Google, submit"
            echo "the sitemap at https://trybarakah.com/sitemap.xml via"
            echo "Search Console. See docs/SEO-INDEXING-PLAYBOOK.md."
          } >> "$GITHUB_STEP_SUMMARY"
