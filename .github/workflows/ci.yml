name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      # Fail the build on any new HIGH or CRITICAL vulnerability. Moderate +
      # low are tracked separately (visible in npm audit output below) but
      # don't block CI; a separate issue/PR should address them.
      - name: Security audit (fail on high/critical)
        run: npm audit --audit-level=high
      - name: Lint
        run: npm run lint
      - name: Unit tests (vitest)
        run: npm test -- --run
      - name: Build
        run: npm run build
      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: .next/
