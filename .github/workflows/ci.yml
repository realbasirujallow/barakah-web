name: CI

# 2026-05-01: paths-ignore added so docs-only PRs (PROJECT_BRIEF.md
# updates, marketing strategy notes, README tweaks, etc.) don't burn
# CI minutes building Next.js for files that don't affect the bundle.
# A real source change touching docs in the same PR still triggers CI
# because GitHub treats these as "ignore IF every changed file matches" —
# any single src/ change overrides the ignore.
on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'PROJECT_BRIEF.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'PROJECT_BRIEF.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      # Fail the build on any new HIGH or CRITICAL vulnerability. Moderate +
      # low are tracked separately (visible in npm audit output below) but
      # don't block CI; a separate issue/PR should address them.
      - name: Security audit (fail on high/critical)
        run: npm audit --audit-level=high
      - name: Lint
        run: npm run lint
      # Round 32: tsc --noEmit added after the Round 28 Next 16 middleware.ts +
      # proxy.ts coexistence slipped through CI (only lint + vitest + build ran,
      # and build didn't fail because the bundler tolerated the conflict until
      # deploy). Pre-commit added it in Round 29 but CI was still the hole. If
      # types break or Next conventions regress, CI fails before the deploy.
      - name: Type check (tsc)
        run: npx tsc --noEmit
      - name: Unit tests (vitest)
        run: npm test -- --run
      - name: Build
        run: npm run build
      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: .next/
