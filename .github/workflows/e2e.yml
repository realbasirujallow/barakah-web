name: E2E (Playwright)

# Catches regressions against production that unit tests can't see —
# auth flow, dashboard data fetch, plan-gated endpoints, etc.
#
# Required GitHub repository secrets (settings → Secrets and variables → Actions):
#   - E2E_EMAIL    : applereview@trybarakah.com
#   - E2E_PASSWORD : (the App Store reviewer account password)
#
# The workflow runs:
#   - on every PR that touches src/, e2e/, or this workflow file
#   - nightly at 08:14 UTC (off the hour to avoid the cron-stampede minute)
#   - on demand via "Run workflow" in the Actions tab
#
# All jobs hit https://trybarakah.com (production). Override with the
# `target_url` workflow_dispatch input if you want to point at a staging URL.

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'e2e/**'
      - '.github/workflows/e2e.yml'
      - 'playwright.config.ts'
      - 'package*.json'
  schedule:
    # Nightly. Pick a quiet minute to avoid hitting the API at the same instant
    # as every other repo on the planet.
    - cron: '14 8 * * *'
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Override base URL (default https://trybarakah.com)'
        required: false
        default: 'https://trybarakah.com'

jobs:
  playwright:
    name: Playwright suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Don't fail PRs from forks where the secrets aren't injected — the suite
    # would just skip everything anyway and produce confusing red Xs.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          E2E_BASE_URL: ${{ inputs.target_url || 'https://trybarakah.com' }}
          E2E_API_URL:  ${{ inputs.target_url || 'https://trybarakah.com' }}
          E2E_EMAIL:    ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: npx playwright test --reporter=list

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
